<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>林澌潾的小游戏网站 - 60个精彩小游戏</title>
    <link rel="icon" href="./favicon.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --pink: #ff6b9d;
            --purple: #c44cff;
            --blue: #4c9aff;
            --cyan: #00d2ff;
            --yellow: #ffd93d;
            --green: #6bcb77;
            --orange: #ff8c42;
            --red: #ff5757;
        }

        body {
            font-family: 'Nunito', 'Microsoft YaHei', sans-serif;
            background: #0f0c29;
            min-height: 100vh;
            color: #fff;
            overflow-x: hidden;
        }

        /* ==================== 背景粒子 ==================== */
        #bg-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* ==================== 浮动装饰 ==================== */
        .float-shapes {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .float-shape {
            position: absolute;
            border-radius: 50%;
            opacity: 0.15;
            animation: floatUp linear infinite;
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh) rotate(0deg) scale(1); opacity: 0; }
            10% { opacity: 0.15; }
            90% { opacity: 0.15; }
            100% { transform: translateY(-10vh) rotate(360deg) scale(1.2); opacity: 0; }
        }

        /* ==================== 主容器 ==================== */
        .main-wrapper {
            position: relative;
            z-index: 1;
            max-width: 1300px;
            margin: 0 auto;
            padding: 0 20px 60px;
        }

        /* ==================== 顶部导航 ==================== */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-avatar {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--pink), var(--purple));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            box-shadow: 0 0 20px rgba(255, 107, 157, 0.5);
            animation: pulse-glow 2s ease-in-out infinite;
        }

        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 20px rgba(255, 107, 157, 0.5); }
            50% { box-shadow: 0 0 40px rgba(255, 107, 157, 0.8), 0 0 60px rgba(196, 76, 255, 0.4); }
        }

        .logo-text h2 {
            font-size: 1.5rem;
            font-weight: 900;
            background: linear-gradient(90deg, var(--pink), var(--cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1.2;
        }

        .logo-text span {
            font-size: 0.8rem;
            color: rgba(255,255,255,0.5);
            font-weight: 600;
        }

        /* ==================== 搜索框 ==================== */
        .search-box {
            position: relative;
            width: 300px;
        }

        .search-box input {
            width: 100%;
            padding: 12px 20px 12px 48px;
            border-radius: 50px;
            border: 2px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.08);
            color: #fff;
            font-size: 0.95rem;
            font-family: inherit;
            outline: none;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }

        .search-box input::placeholder { color: rgba(255,255,255,0.4); }

        .search-box input:focus {
            border-color: var(--pink);
            background: rgba(255,255,255,0.12);
            box-shadow: 0 0 20px rgba(255, 107, 157, 0.3);
        }

        .search-box .search-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.1rem;
            opacity: 0.6;
        }

        /* ==================== 英雄标题区 ==================== */
        .hero-section {
            text-align: center;
            padding: 40px 0 50px;
            position: relative;
        }

        .hero-badge {
            display: inline-block;
            padding: 6px 20px;
            border-radius: 50px;
            background: linear-gradient(90deg, rgba(255,107,157,0.2), rgba(196,76,255,0.2));
            border: 1px solid rgba(255,255,255,0.15);
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--pink);
            margin-bottom: 20px;
            animation: fadeInDown 0.8s ease both;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .hero-title {
            font-size: clamp(2.2rem, 5vw, 4rem);
            font-weight: 900;
            line-height: 1.1;
            margin-bottom: 16px;
            animation: fadeInDown 0.8s 0.2s ease both;
        }

        .hero-title .line1 {
            display: block;
            color: #fff;
        }

        .hero-title .line2 {
            display: block;
            background: linear-gradient(90deg, var(--pink), var(--orange), var(--yellow), var(--green), var(--cyan), var(--purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-size: 200% auto;
            animation: gradientFlow 3s linear infinite;
        }

        @keyframes gradientFlow {
            0% { background-position: 0% center; }
            100% { background-position: 200% center; }
        }

        .hero-subtitle {
            font-size: 1.15rem;
            color: rgba(255,255,255,0.55);
            font-weight: 600;
            animation: fadeInDown 0.8s 0.4s ease both;
        }

        .hero-stats {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 30px;
            animation: fadeInDown 0.8s 0.6s ease both;
        }

        .stat-item {
            text-align: center;
        }

        .stat-num {
            font-size: 2.2rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--cyan), var(--blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
        }

        .stat-label {
            font-size: 0.8rem;
            color: rgba(255,255,255,0.4);
            font-weight: 600;
            margin-top: 4px;
        }

        /* ==================== 分类标签 ==================== */
        .category-tabs {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 40px;
            animation: fadeInUp 0.8s 0.8s ease both;
        }

        .cat-btn {
            padding: 8px 20px;
            border-radius: 50px;
            border: 2px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.06);
            color: rgba(255,255,255,0.7);
            font-size: 0.88rem;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
            backdrop-filter: blur(10px);
        }

        .cat-btn:hover, .cat-btn.active {
            border-color: var(--pink);
            background: linear-gradient(135deg, rgba(255,107,157,0.2), rgba(196,76,255,0.2));
            color: #fff;
            box-shadow: 0 0 20px rgba(255, 107, 157, 0.3);
            transform: translateY(-2px);
        }

        .cat-btn.active { color: var(--pink); }

        /* ==================== 游戏网格 ==================== */
        .section-title {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
            font-size: 1.3rem;
            font-weight: 800;
            color: #fff;
            animation: fadeInUp 0.6s ease both;
        }

        .section-title::after {
            content: '';
            flex: 1;
            height: 2px;
            background: linear-gradient(90deg, rgba(255,255,255,0.1), transparent);
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 16px;
        }

        /* ==================== 游戏卡片 ==================== */
        .game-card {
            position: relative;
            border-radius: 20px;
            background: rgba(255,255,255,0.06);
            border: 2px solid rgba(255,255,255,0.08);
            overflow: hidden;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(10px);
            animation: cardAppear 0.5s ease both;
            text-decoration: none;
            display: block;
            color: inherit;
        }

        @keyframes cardAppear {
            from { opacity: 0; transform: translateY(30px) scale(0.9); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .game-card:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: rgba(255, 107, 157, 0.5);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3), 0 0 30px rgba(255,107,157,0.2);
        }

        .card-thumb {
            height: 130px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
            position: relative;
            overflow: hidden;
        }

        .card-thumb::before {
            content: '';
            position: absolute;
            inset: 0;
            opacity: 0.3;
        }

        .card-info {
            padding: 14px 16px;
            position: relative;
        }

        .card-tag {
            position: absolute;
            top: -14px;
            right: 16px;
            padding: 3px 12px;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            z-index: 2;
        }

        .card-title {
            font-size: 0.95rem;
            font-weight: 800;
            color: #fff;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-desc {
            font-size: 0.75rem;
            color: rgba(255,255,255,0.45);
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-play {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 10px;
            font-size: 0.78rem;
            font-weight: 700;
            color: var(--pink);
            opacity: 0;
            transform: translateX(-10px);
            transition: all 0.3s;
        }

        .game-card:hover .card-play {
            opacity: 1;
            transform: translateX(0);
        }

        .card-shine {
            position: absolute;
            top: 0; left: -100%;
            width: 60%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
            transition: left 0.5s;
            pointer-events: none;
        }

        .game-card:hover .card-shine { left: 160%; }

        /* ==================== 无结果 ==================== */
        .no-results {
            text-align: center;
            padding: 80px 20px;
            display: none;
        }

        .no-results.visible { display: block; }

        .no-results .emoji { font-size: 4rem; margin-bottom: 16px; }

        .no-results p {
            font-size: 1.1rem;
            color: rgba(255,255,255,0.4);
            font-weight: 600;
        }

        /* ==================== 页脚 ==================== */
        .site-footer {
            text-align: center;
            padding: 40px 20px 60px;
            position: relative;
            z-index: 1;
        }

        .footer-divider {
            width: 120px;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--pink), var(--purple), transparent);
            margin: 0 auto 24px;
            border-radius: 2px;
        }

        .footer-links {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-bottom: 16px;
        }

        .footer-links span {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.4);
            font-weight: 600;
        }

        .footer-copy {
            font-size: 0.78rem;
            color: rgba(255,255,255,0.25);
        }

        /* ==================== 回到顶部 ==================== */
        .back-to-top {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--pink), var(--purple));
            color: #fff;
            border: none;
            font-size: 1.3rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(255, 107, 157, 0.4);
            transition: all 0.3s;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
        }

        .back-to-top.show {
            opacity: 1;
            pointer-events: auto;
        }

        .back-to-top:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(255, 107, 157, 0.6);
        }

        /* ==================== 动画 ==================== */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes bounceIn {
            0% { transform: scale(0); }
            50% { transform: scale(1.15); }
            70% { transform: scale(0.95); }
            100% { transform: scale(1); }
        }

        /* ==================== 响应式 ==================== */
        @media (max-width: 768px) {
            .top-bar { flex-direction: column; gap: 16px; }
            .search-box { width: 100%; }
            .hero-stats { gap: 20px; }
            .stat-num { font-size: 1.8rem; }
            .games-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
            .card-thumb { height: 100px; font-size: 2.8rem; }
            .hero-section { padding: 20px 0 30px; }
        }

        /* ==================== 选中高亮 ==================== */
        ::selection {
            background: var(--pink);
            color: #fff;
        }

        /* 滚动条 */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); }
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(var(--pink), var(--purple));
            border-radius: 4px;
        }
    </style>
</head>

// ==================== 背景粒子 ====================
const canvas = document.getElementById('bg-canvas');
const ctx = canvas.getContext('2d');
let particles = [];

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

class Particle {
    constructor() { this.reset(); }
    reset() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 3 + 1;
        this.speedX = (Math.random() - 0.5) * 0.5;
        this.speedY = Math.random() * 0.5 + 0.2;
        this.opacity = Math.random() * 0.5 + 0.1;
        const colors = ['255,107,157','196,76,255','76,203,119','255,217,61','0,210,255','255,140,66'];
        this.color = colors[Math.floor(Math.random() * colors.length)];
        this.life = 0;
        this.maxLife = Math.random() * 300 + 200;
    }
    update() {
        this.x += this.speedX;
        this.y += this.speedY;
        this.life++;
        if (this.life > this.maxLife || this.y > canvas.height) this.reset();
    }
    draw() {
        const alpha = this.opacity * (1 - this.life / this.maxLife);
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${this.color},${alpha})`;
        ctx.fill();
    }
}

for (let i = 0; i < 80; i++) particles.push(new Particle());

function animateParticles() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => { p.update(); p.draw(); });
    requestAnimationFrame(animateParticles);
}
animateParticles();

// ==================== 浮动形状 ====================
const floatShapes = document.getElementById('floatShapes');
const shapeColors = ['#ff6b9d','#c44cff','#4c9aff','#00d2ff','#ffd93d','#6bcb77','#ff8c42'];

for (let i = 0; i < 15; i++) {
    const el = document.createElement('div');
    el.className = 'float-shape';
    const size = Math.random() * 60 + 20;
    el.style.cssText = `
        width: ${size}px; height: ${size}px;
        left: ${Math.random() * 100}%;
        background: linear-gradient(135deg, ${shapeColors[i % shapeColors.length]}88, ${shapeColors[(i+3) % shapeColors.length]}44);
        animation-duration: ${Math.random() * 15 + 15}s;
        animation-delay: ${Math.random() * 10}s;
    `;
    floatShapes.appendChild(el);
}

const catLabels = {
    all:     { icon: '&#x1F3AE;', text: '全部游戏' },
    action:  { icon: '&#x2694;&#xFE0F;', text: '动作冒险' },
    puzzle:  { icon: '&#x1F9E9;', text: '益智解谜' },

    holiday: { icon: '&#x1F384;', text: '节日主题' },

let activeCat = 'all';
let searchTerm = '';

document.getElementById('categoryTabs').addEventListener('click', (e) => {
    const btn = e.target.closest('.cat-btn');
    if (!btn) return;
    activeCat = btn.dataset.cat;
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderGames();
});

// ==================== 搜索 ====================
document.getElementById('searchInput').addEventListener('input', (e) => {
    searchTerm = e.target.value.trim();
    renderGames();
});

// ==================== 渲染游戏 ====================
function getGradient(color) {
    return `linear-gradient(135deg, ${color}33, ${color}11)`;
}

function renderGames() {
    const grid = document.getElementById('gamesGrid');
    const noResults = document.getElementById('noResults');
    const sectionTitle = document.getElementById('sectionTitle');
    const gameCount = document.getElementById('gameCount');

    let filtered = games.filter(g => {
        const matchCat = activeCat === 'all' || g.cat === activeCat;
        const matchSearch = !searchTerm || g.name.includes(searchTerm) || g.desc.includes(searchTerm);
        return matchCat && matchSearch;
    });

    if (filtered.length === 0) {
        grid.innerHTML = '';
        noResults.classList.add('visible');
        gameCount.textContent = '';
    } else {
        noResults.classList.remove('visible');
        gameCount.textContent = `（${filtered.length}个）`;
    }

    sectionTitle.innerHTML = catLabels[activeCat].icon;

    grid.innerHTML = filtered.map((g, i) => `
        <a href="${g.href}" class="game-card" target="_blank" style="animation-delay: ${i * 0.04}s;">
            <div class="card-shine"></div>
            <div class="card-thumb" style="background: ${getGradient(g.color)};">
                <span style="filter: drop-shadow(0 4px 12px ${g.color}88);">${g.emoji}</span>
            </div>
            <div class="card-info">
                <div class="card-tag" style="background:${g.color}22;color:${g.color};border:1px solid ${g.color}44;">
                    ${g.tag}
                </div>
                <div class="card-title">${g.name}</div>
                <div class="card-desc">${g.desc}</div>
                <div class="card-play">&#x25B6; 开始游戏</div>
            </div>
        </a>
    `).join('');
}

renderGames();

backToTop.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
